name: Daily tour data update

on:
  workflow_dispatch:
  schedule:
    # 20:35 Asia/Taipei.
    - cron: "35 12 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run guarded daily update
        run: npm run data:update:guarded

      - name: Build site
        run: npm run build

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json public/data/*.csv exports/tour-data-readiness-audit-*
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh aurora tour data"
            git push
          fi
