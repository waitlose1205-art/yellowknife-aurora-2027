name: Daily tour data refresh

on:
  schedule:
    - cron: "20 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-tour-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh tour data
        run: npm run data:daily

      - name: Validate site build
        run: npm run build

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/tour-products.latest.json public/data/tour-products.latest.csv public/data/source-status.json
          if git diff --cached --quiet; then
            echo "No tour data changes."
          else
            git commit -m "Refresh aurora tour data"
            git push
          fi
